# =============================================================
# compose.dev.yml  (override)
#
# Builds service images from local source. Exposes ports for
# direct access. Uses Caddyfile.dev (plain HTTP on :80 + raw
# service ports). Postgres port exposed for local tooling.
#
# Usage:
#   docker compose \
#     -f compose.base.yml \
#     -f compose.app.yml \
#     -f compose.dev.yml \
#     up --build
#
# Or via just: just dev up
# =============================================================

services:

  # Expose postgres for local psql / GUI tools
  postgres:
    ports:
      - "5432:5432"

  # -----------------
  # 🌐 CADDY (dev)
  # -----------------
  caddy:
    image: caddy:latest
    container_name: caddy-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8090:8090"
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

  # =============================================================
  # 📊 BESZEL (system monitoring)
  # =============================================================

  beszel:
    profiles: [monitor]
    ports:
      - "8090:8090"

  # -----------------
  # 🔐 IDENTITY-X
  # -----------------
  identity-x:
    build:
      context: .
      dockerfile: api/identityx/Dockerfile

  # -----------------
  # 💳 PAYSSAGE
  # -----------------
  payssage:
    build:
      context: .
      dockerfile: api/payssage/Dockerfile

  # -----------------
  # 📢 INFORMD
  # -----------------
  informd:
    build:
      context: .
      dockerfile: api/informd/Dockerfile

  # -----------------
  # 🎟️ UNIVENTS
  # -----------------
  univents:
    build:
      context: .
      dockerfile: api/univents/Dockerfile

  # compose.dev.yml
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # web UI
      - "1025:1025"  # SMTP
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
  beszel_data: