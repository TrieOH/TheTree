# =============================================================
# compose.prod.yml  (entry point)
#
# Production environment. Pulls versioned images from GHCR,
# Caddy with TLS via Cloudflare origin certs + Let's Encrypt.
# Server profiles (email, git) are included but inert unless
# explicitly activated. Postgres is internal only.
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#   docker compose -f compose.prod.yml --profile email up -d mox
#   docker compose -f compose.prod.yml --profile git up -d forgejo ...
#
# Or via just: just prod, just email, just git
# =============================================================

include:
  - compose.base.yml
  - compose.app.yml
  - compose.obs.yml
  - compose.server.yml

services:
  # -----------------
  # 🌐 CADDY (prod)
  # -----------------
  caddy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/caddy/certs:/etc/caddy/certs:ro

  # -----------------
  # 🔐 IDENTITY-X
  # -----------------
  identityx:
    image: git.trieoh.com/trieoh/identityx:${IDENTITY_X_TAG}

  # -----------------
  # 💳 PAYSSAGE
  # -----------------
  payssage:
    image: git.trieoh.com/trieoh/payssage:${PAYSSAGE_TAG}

  # -----------------
  # 📢 INFORMD
  # -----------------
  informd:
    image: git.trieoh.com/trieoh/informd:${INFORMD_TAG}

  # -----------------
  # 🎟️ UNIVENTS
  # -----------------
  univents:
    image: git.trieoh.com/trieoh/univents:${UNIVENTS_TAG}

volumes:
  caddy_data:
  caddy_config: