# infra/victoria-metrics/scrape.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: identityx
    static_configs:
      - targets: ["identityx:8080"]

  - job_name: informd
    static_configs:
      - targets: ["informd:8080"]

  - job_name: payssage
    static_configs:
      - targets: ["payssage:8080"]

  - job_name: univents
    static_configs:
      - targets: ["univents:8080"]