apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: victoriametrics-metrics-datasource
    access: proxy
    url: http://victoria-metrics:8428
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victoria-logs:9428

  - name: VictoriaTraces
    type: jaeger
    access: proxy
    url: http://victoria-traces:10428/select/jaeger