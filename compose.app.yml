# =============================================================
# compose.app.yml
#
# All TrieOH application services: Identity-X, Payssage,
# Informd, Univents. Gated behind --profile core.
# Postgres and Caddy come from compose.base.yml.
#
# Included by compose.dev.yml and compose.prod.yml.
# =============================================================

services:

  # =============================================================
  # 🔐 IDENTITY-X
  # =============================================================

  identityx:
    profiles: [core]
    container_name: identityx
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      caddy:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    env_file:
      - .tree.env
      - api/identityx/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 2s

  # =============================================================
  # 💳 PAYSSAGE
  # =============================================================

  payssage:
    profiles: [core]
    container_name: payssage
    restart: unless-stopped
