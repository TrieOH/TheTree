name: Docker Compose Build

on:
  pull_request:
    branches: [ staging, production ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Dummy env vars so Compose doesn't fail in CI
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

    steps:
      # -----------------------------
      # Checkout code
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Set up Docker Buildx
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Per-PR Docker layer cache
      # -----------------------------
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-buildx-cache-pr-${{ github.event.pull_request.number }}
          restore-keys: docker-buildx-cache-pr-

      # -----------------------------
      # Build Docker Compose
      # -----------------------------
      - name: Build Docker Compose
        run: |
          docker buildx create --use --name buildx-builder
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
