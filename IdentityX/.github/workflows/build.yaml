name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://forgejo-dind:2375

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: git.trieoh.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            git.trieoh.com/trieoh/identity-x:${{ github.ref_name }}
            git.trieoh.com/trieoh/identity-x:latest
          cache-from: type=local,src=/var/cache/buildkit
          cache-to: type=local,dest=/var/cache/buildkit,mode=max