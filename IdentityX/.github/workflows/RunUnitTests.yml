name: GoAuth Tests

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  tests:
    name: Run GoAuth test suite
    runs-on: ubuntu-latest

    env:
      # Non-secret envs can go here
      GO_ENV: test
      CORS_ALLOWED_ORIGINS: localhost:3000,localhost:8080
      CORS_ALLOWED_METHODS: GET,POST,PATCH,PUT,DELETE
      CORS_ALLOWED_HEADERS: Content-Type,Authorization,Refresh,Cookie

      # Secrets (defined in repo settings)
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_TEST_DB: ${{ secrets.POSTGRES_TEST_DB }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_HOST_TEST: ${{ secrets.POSTGRES_HOST_TEST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      JWT_MASTER_KEY: ${{ secrets.JWT_MASTER_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests with docker compose
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from go-auth-test

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
