services:
  go-auth-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST_TEST}:${POSTGRES_PORT}/${POSTGRES_TEST_DB}?sslmode=disable"
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_MASTER_KEY: ${JWT_MASTER_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      ISSUER: ${ISSUER:-GoAuth}
      ENV: ${ENV:-development}
    depends_on:
      - go-auth-test-database
    networks:
      - testnet
    command: ["go", "test", "-v", "./testing_framework/..."]

  go-auth-test-database:
    image: postgres:18
    command:
      - postgres
      - -c
      - log_statement=${POSTGRES_LOG_STATEMENT:-none}
      - -c
      - log_min_messages=${POSTGRES_LOG_MIN_MESSAGES:-fatal}
      - -c
      - log_min_error_statement=${POSTGRES_LOG_MIN_ERROR_STATEMENT:-fatal}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_TEST_DB}
    ports:
      - "5433:5432"
    networks:
      - testnet

networks:
  testnet:
    driver: bridge

