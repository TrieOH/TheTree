services:
  go-auth-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST_TEST}:${POSTGRES_PORT}/${POSTGRES_TEST_DB}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
      JWT_MASTER_KEY: ${JWT_MASTER_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
    depends_on:
      - go-auth-test-database
    networks:
      - testnet
    command: ["go", "test", "-v", "./tests/..."]

  go-auth-test-database:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_TEST_DB}
    ports:
      - "5433:5432"
    networks:
      - testnet

networks:
  testnet:
    driver: bridge

