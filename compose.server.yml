# =============================================================
# compose.server.yml
#
# Server-only infrastructure: mail and git forge.
# Activate individually via Docker profiles.
#
# Profiles:
#   email → mox
#   git   → forgejo, forgejo-runner, forgejo-dind
#
# Observability services live in compose.obs.yml.
# Object storage (rustfs) lives in compose.base.yml.
#
# No service exposes ports directly — all HTTP traffic is
# routed through Caddy. Exception: mox SMTP/IMAP ports (25,
# 465, 587, 993) are not HTTP and must be exposed directly.
# Forgejo SSH is handled by system sshd forwarding to localhost:3000.
# =============================================================

services:
  # =============================================================
  # 📧 MOX (mail server)
  #
  # SMTP/IMAP ports are exposed directly — not HTTP, Caddy
  # cannot proxy them.
  # =============================================================

  mox:
    profiles: [email]
    image: r.xmox.nl/mox:latest
    container_name: mox
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      caddy:
        condition: service_healthy
    ports:
      - "25:25"    # SMTP
      - "465:465"  # SMTPS
      - "587:587"  # submission
      - "993:993"  # IMAPS
      - "127.0.0.1:9090:9090" # Admin panel
    volumes:
      - ./infra/mox/config:/mox/config
      - ./infra/mox/data:/mox/data
      - ./infra/mox/certs:/mox/certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: mox -config /mox/config/mox.conf serve
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/webmail || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # =============================================================
  # 🔧 FORGEJO (git forge)
  # =============================================================

  forgejo:
    profiles: [git]
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_healthy
    env_file:
      - ./infra/forgejo/.env
    networks:
      - internal
    volumes:
      - forgejo-data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  forgejo-runner:
    profiles: [git]
    image: code.forgejo.org/forgejo/runner:12
    container_name: forgejo-runner
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://forgejo-dind:2375
    networks:
      - internal
    volumes:
      - ./forgejo-runner/config.yml:/data/config.yml
      - forgejo-runner-data:/data
    command: /bin/sh -c "sleep 5 && forgejo-runner daemon --config /data/config.yml"

  forgejo-dind:
    profiles: [git]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "3g"
    image: docker:dind
    container_name: forgejo-dind
    privileged: true
    restart: unless-stopped
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - internal
    volumes:
      - forgejo-dind-data:/var/lib/docker
      - buildkit-cache:/var/cache/buildkit
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  forgejo-data:
  forgejo-runner-data:
  forgejo-dind-data:
  buildkit-cache:
