# =============================================================
# compose.base.yml
#
# Shared foundation: network, single Postgres instance, and
# Caddy reverse proxy. Dev/prod overrides supply the Caddyfile,
# ports, and TLS config. All other compose files extend this.
#
# Usage (never run alone):
#   docker compose -f compose.base.yml -f compose.app.yml ...
# =============================================================

services:

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .tree.env
    volumes:
      - postgres_data:/var/lib/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TheTreeRoot -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================
  # 🌐 CADDY
  #
  # Starts before app services — they depend on Caddy being
  # healthy before boot. Ports and Caddyfile supplied by the
  # dev/prod override.
  # =============================================================

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .tree.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config: