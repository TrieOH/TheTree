# =============================================================
# compose.base.yml
#
# Shared foundation: network + single Postgres instance with
# one database per service. All other compose files extend this.
#
# Usage (never run alone):
#   docker compose -f compose.base.yml -f compose.app.yml ...
# =============================================================

services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .tree.env
    volumes:
      - postgres_data:/var/lib/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TheTreeRoot -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  internal:
    driver: bridge

volumes:
  postgres_data: