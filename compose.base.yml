# =============================================================
# compose.base.yml
#
# Shared foundation: network, single Postgres instance,
# Caddy reverse proxy, and RustFS object storage.
# Dev/prod overrides supply the Caddyfile, ports, and TLS
# config. All other compose files extend this.
#
# Usage (never run alone):
#   docker compose -f compose.base.yml -f compose.app.yml ...
# =============================================================

services:

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .tree.env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TheTree -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================
  # 🌐 CADDY
  #
  # Starts before app services — they depend on Caddy being
  # healthy before boot. Ports and Caddyfile supplied by the
  # dev/prod override.
  # =============================================================

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .tree.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:2019/"]
      interval: 3s
      timeout: 5s
      retries: 5

  # =============================================================
  # 📂 RUSTFS (S3-compatible object storage)
  # =============================================================

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
    env_file:
      - .tree.env
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health && wget -qO- http://localhost:9001/rustfs/console/health"]
      interval: 3s
      timeout: 5s
      retries: 5

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  rustfs_data:
  rustfs_logs: