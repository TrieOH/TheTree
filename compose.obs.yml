# =============================================================
# compose.obs.yml
#
# Observability stack: system monitoring, metrics, logs,
# traces, and dashboards. Always starts with dev/prod — no
# profile needed.
#
# Services:
#   beszel, beszel-agent  → system + container monitoring
#   victoria-metrics      → metrics storage (Prometheus-compat)
#   victoria-logs         → log storage
#   victoria-traces       → trace storage
#   vector                → log collector (Docker → VictoriaLogs)
#   grafana               → dashboards
#
# All HTTP traffic routed through Caddy.
# No service exposes ports directly.
# =============================================================

services:

  # =============================================================
  # 📊 BESZEL (system monitoring)
  # =============================================================

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8090
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 10s

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - beszel_agent_data:/var/lib/beszel-agent
      - beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .beszel.env
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8090
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================
  # 📊 VICTORIA METRICS (metrics)
  # =============================================================

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    restart: unless-stopped
    command:
      - --retentionPeriod=7d
      - --httpListenAddr=:8428
      - --promscrape.config=/etc/victoria-metrics/scrape.yml
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
      - ./infra/victoria-metrics/scrape.yml:/etc/victoria-metrics/scrape.yml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8428/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =============================================================
  # 📝 VICTORIA LOGS (logs)
  # =============================================================

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: victoria-logs
    restart: unless-stopped
    command:
      - --retentionPeriod=7d
      - --httpListenAddr=:9428
    volumes:
      - victoria_logs_data:/victoria-logs-data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9428/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================
  # 🔍 VICTORIA TRACES (traces)
  # =============================================================

  victoria-traces:
    image: victoriametrics/victoria-traces:latest
    container_name: victoria-traces
    restart: unless-stopped
    command:
      - --retentionPeriod=7d
      - --httpListenAddr=:10428
    volumes:
      - victoria_traces_data:/victoria-traces-data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:10428/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================
  # 📝 VECTOR (log collector)
  # =============================================================

  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    restart: unless-stopped
    command: ["--config", "/etc/vector/vector.toml"]
    volumes:
      - ./infra/vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      - victoria-logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8686/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================
  # 📊 GRAFANA
  # =============================================================

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .tree.env
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-metrics-datasource,victoriametrics-logs-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - internal
    depends_on:
      - victoria-metrics
      - victoria-logs
      - victoria-traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  grafana_data:
  victoria_metrics_data:
  victoria_logs_data:
  victoria_traces_data:
  beszel_data:
  beszel_agent_data:
  beszel_socket: