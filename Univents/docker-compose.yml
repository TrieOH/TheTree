services:
  univents:
    container_name: univents
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    networks:
      - internal
      - univents-net
    depends_on:
      univents-database:
        condition: service_started
      univents-redis:
        condition: service_started
      univents-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"

      PORT: ${PORT:-8080}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}

      WS_JWT_SECRET: ${WS_JWT_SECRET}

      DISABLE_RATE_LIMIT: false

      REDIS_ADDR: ${REDIS_ADDR:-univents-redis:6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      IDENTITY_X_URL: ${IDENTITY_X_URL:-http://identity-x:8080}
      IDENTITY_X_API_KEY: ${IDENTITY_X_API_KEY}
      IDENTITY_X_PROJECT_ID: ${IDENTITY_X_PROJECT_ID}

      PAYSSAGE_URL: ${PAYSSAGE_URL:-http://payssage:8080}
      PAYSSAGE_PROVIDER: ${PAYSSAGE_PROVIDER:-mercadopago}
      PAYSSAGE_API_KEY: ${PAYSSAGE_API_KEY}
      PAYSSAGE_WEBHOOK_SECRET: ${PAYSSAGE_WEBHOOK_SECRET}

      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-localhost:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:-false}

      SPICEDB_ADDR: univents-spicedb:50051
      SPICEDB_TOKEN: ${SPICEDB_TOKEN}

  univents-database:
    container_name: univents-database
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - database-data:/var/lib/postgresql
    networks:
      - internal

  univents-redis:
    container_name: univents-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal

  univents-spicedb-migrate:
    container_name: univents-spicedb-migrate
    image: authzed/spicedb:latest
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      univents-database:
        condition: service_started
    networks:
      - internal

  univents-spicedb:
    container_name: univents-spicedb
    image: authzed/spicedb:latest
    command: serve
    restart: unless-stopped
    ports:
      - "50052:50051"
      - "8444:8443"
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_TOKEN}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      univents-spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50051" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

volumes:
  database-data:
  redis-data:

networks:
  internal:
    driver: bridge
  univents-net:
    external: true

