services:
  univents:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    networks:
      - internal
      - univents-net
    depends_on:
      univents-database:
        condition: service_started
      univents-redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"

      PORT: ${PORT:-8080}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      ENV: ${ENV:-development}

      DISABLE_RATE_LIMIT: false

      REDIS_ADDR: ${REDIS_ADDR:-univents-redis:6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      GOAUTH_URL: ${GOAUTH_URL:-http://go-auth:8080}
      GOAUTH_API_KEY: ${GOAUTH_API_KEY}
      GO_AUTH_PROJECT_ID: ${GO_AUTH_PROJECT_ID}

  univents-database:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - database-data:/var/lib/postgresql
    networks:
      - internal

  univents-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  database-data:
  redis-data:

networks:
  internal:
    driver: bridge
  univents-net:
    external: true

