services:


  # -----------------
  # 💳 PAYSSAGE
  # -----------------
  payssage:
    image: ghcr.io/trieoh/payssage:${PAYSSAGE_TAG}
    container_name: payssage
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage-database:
        condition: service_started
      payssage-redis:
        condition: service_started
      payssage-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${PAYSSAGE_POSTGRES_USER}:${PAYSSAGE_POSTGRES_PASSWORD}@payssage-database:5432/${PAYSSAGE_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${PAYSSAGE_REDIS_ADDR}
      REDIS_DB: ${PAYSSAGE_REDIS_DB}
      REDIS_PASSWORD: ${PAYSSAGE_REDIS_PASSWORD}
      REDIS_ASYNQ_DB: ${PAYSSAGE_REDIS_ASYNQ_DB}
      SPICEDB_ADDR: ${PAYSSAGE_SPICEDB_ADDR}
      SPICEDB_TOKEN: ${PAYSSAGE_SPICEDB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${PAYSSAGE_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${PAYSSAGE_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${PAYSSAGE_CORS_ALLOWED_HEADERS}
      TRUST_PROXY_HEADERS: ${PAYSSAGE_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${PAYSSAGE_TRUSTED_PROXIES}
      TEST_MODE: ${PAYSSAGE_TEST_MODE}
      IDENTITY_X_PROJECT_ID: ${PAYSSAGE_IDENTITY_X_PROJECT_ID}
      IDENTITY_X_URL: ${PAYSSAGE_IDENTITY_X_URL}
      IDENTITY_X_API_KEY: ${PAYSSAGE_IDENTITY_X_API_KEY}
      MP_CLIENT_ID: ${PAYSSAGE_MP_CLIENT_ID}
      MP_ACCESS_TOKEN: ${PAYSSAGE_MP_ACCESS_TOKEN}
      MP_CLIENT_SECRET: ${PAYSSAGE_MP_CLIENT_SECRET}
      MP_REDIRECT_URI: ${PAYSSAGE_MP_REDIRECT_URI}
      MP_WEBHOOK_SECRET: ${PAYSSAGE_MP_WEBHOOK_SECRET}
      MP_TEST_ACCESS_TOKEN: ${PAYSSAGE_MP_TEST_ACCESS_TOKEN}
      MP_TEST_PUBLIC_KEY: ${PAYSSAGE_MP_TEST_PUBLIC_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  payssage-database:
    image: postgres:18
    container_name: payssage-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAYSSAGE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYSSAGE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYSSAGE_POSTGRES_DB}
    volumes:
      - payssage-db:/var/lib/postgresql
    networks:
      - internal

  # -----------------
  # 🎟️ UNIVENTS
  # -----------------
  univents:
    image: ghcr.io/trieoh/univents:${UNIVENTS_TAG}
    container_name: univents
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage:
        condition: service_healthy
      univents-database:
        condition: service_started
      univents-redis:
        condition: service_started
      univents-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${UNIVENTS_POSTGRES_USER}:${UNIVENTS_POSTGRES_PASSWORD}@univents-database:5432/${UNIVENTS_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${UNIVENTS_REDIS_ADDR}
      REDIS_DB: ${UNIVENTS_REDIS_DB}
      REDIS_PASSWORD: ${UNIVENTS_REDIS_PASSWORD}
      REDIS_ASYNQ_DB: ${UNIVENTS_REDIS_ASYNQ_DB}
      SPICEDB_ADDR: ${UNIVENTS_SPICEDB_ADDR}
      SPICEDB_TOKEN: ${UNIVENTS_SPICEDB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${UNIVENTS_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${UNIVENTS_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${UNIVENTS_CORS_ALLOWED_HEADERS}
      TRUST_PROXY_HEADERS: ${UNIVENTS_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${UNIVENTS_TRUSTED_PROXIES}
      WS_JWT_SECRET: ${UNIVENTS_WS_JWT_SECRET}
      IDENTITY_X_PROJECT_ID: ${UNIVENTS_IDENTITY_X_PROJECT_ID}
      IDENTITY_X_URL: ${UNIVENTS_IDENTITY_X_URL}
      IDENTITY_X_API_KEY: ${UNIVENTS_IDENTITY_X_API_KEY}
      PAYSSAGE_URL: ${UNIVENTS_PAYSSAGE_URL}
      PAYSSAGE_PROVIDER: ${UNIVENTS_PAYSSAGE_PROVIDER}
      PAYSSAGE_API_KEY: ${UNIVENTS_PAYSSAGE_API_KEY}
      PAYSSAGE_WEBHOOK_SECRET: ${UNIVENTS_PAYSSAGE_WEBHOOK_SECRET}
      OBJECT_STORAGE_ENDPOINT: ${UNIVENTS_OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_ACCESS_KEY: ${UNIVENTS_OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${UNIVENTS_OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_USE_SSL: ${UNIVENTS_OBJECT_STORAGE_USE_SSL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  univents-database:
    image: postgres:18
    container_name: univents-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${UNIVENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${UNIVENTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${UNIVENTS_POSTGRES_DB}
    volumes:
      - univents-db:/var/lib/postgresql
    networks:
      - internal



# -----------------
# 🌐 NETWORKS
# -----------------
networks:
  internal:
    driver: bridge
