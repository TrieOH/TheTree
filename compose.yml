services:
  # -----------------
  # 🌐 CADDY (prod)
  # -----------------
  caddy:
    profiles: [prod]
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/caddy/certs:/etc/caddy/certs:ro
    environment:
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage:
        condition: service_healthy
      informd:
        condition: service_healthy
      forgejo:
        condition: service_healthy
      univents:
        condition: service_healthy

  # -----------------
  # 🌐 CADDY (dev)
  # -----------------
  caddy-dev:
    profiles: [dev]
    image: caddy:latest
    container_name: caddy-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage:
        condition: service_healthy
      informd:
        condition: service_healthy
      univents:
        condition: service_healthy

  # -----------------
  # 🔐 IDENTITY-X
  # -----------------
  identity-x:
    image: ghcr.io/trieoh/identity-x:${IDENTITY_X_TAG}
    container_name: identity-x
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x-database:
        condition: service_started
      identity-x-redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://${IDENTITY_X_POSTGRES_USER}:${IDENTITY_X_POSTGRES_PASSWORD}@identity-x-database:5432/${IDENTITY_X_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${IDENTITY_X_REDIS_ADDR}
      REDIS_DB: ${IDENTITY_X_REDIS_DB}
      REDIS_PASSWORD: ${IDENTITY_X_REDIS_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${IDENTITY_X_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${IDENTITY_X_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${IDENTITY_X_CORS_ALLOWED_HEADERS}
      ISSUER: ${IDENTITY_X_ISSUER}
      TRUST_PROXY_HEADERS: ${IDENTITY_X_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${IDENTITY_X_TRUSTED_PROXIES}
      APP_URL: ${IDENTITY_X_APP_URL}
      DEBUG_MODE: ${IDENTITY_X_DEBUG_MODE}
      SMTP_HOST: ${IDENTITY_X_SMTP_HOST}
      SMTP_PORT: ${IDENTITY_X_SMTP_PORT}
      SMTP_USERNAME: ${IDENTITY_X_SMTP_USERNAME}
      SMTP_PASSWORD: ${IDENTITY_X_SMTP_PASSWORD}
      SMTP_FROM: ${IDENTITY_X_SMTP_FROM}
      SMTP_TLS: ${IDENTITY_X_SMTP_TLS}
      SMTP_STARTTLS: ${IDENTITY_X_SMTP_STARTTLS}
      ENCRYPTION_KEY: ${IDENTITY_X_ENCRYPTION_KEY}
      IDENTITY_X_KEY_LIFETIME: ${IDENTITY_X_KEY_LIFETIME}
      ROTATE_KEYS_JOB_DURATION: ${IDENTITY_X_ROTATE_KEYS_JOB_DURATION}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  identity-x-database:
    image: postgres:18
    container_name: identity-x-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${IDENTITY_X_POSTGRES_USER}
      POSTGRES_PASSWORD: ${IDENTITY_X_POSTGRES_PASSWORD}
      POSTGRES_DB: ${IDENTITY_X_POSTGRES_DB}
    volumes:
      - identityx-db:/var/lib/postgresql
    networks:
      - internal

  identity-x-redis:
    image: redis:7-alpine
    container_name: identity-x-redis
    restart: unless-stopped
    command: redis-server --requirepass ${IDENTITY_X_REDIS_PASSWORD} --save "" --appendonly no
    networks:
      - internal

  # -----------------
  # 💳 PAYSSAGE
  # -----------------
  payssage:
    image: ghcr.io/trieoh/payssage:${PAYSSAGE_TAG}
    container_name: payssage
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage-database:
        condition: service_started
      payssage-redis:
        condition: service_started
      payssage-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${PAYSSAGE_POSTGRES_USER}:${PAYSSAGE_POSTGRES_PASSWORD}@payssage-database:5432/${PAYSSAGE_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${PAYSSAGE_REDIS_ADDR}
      REDIS_DB: ${PAYSSAGE_REDIS_DB}
      REDIS_PASSWORD: ${PAYSSAGE_REDIS_PASSWORD}
      REDIS_ASYNQ_DB: ${PAYSSAGE_REDIS_ASYNQ_DB}
      SPICEDB_ADDR: ${PAYSSAGE_SPICEDB_ADDR}
      SPICEDB_TOKEN: ${PAYSSAGE_SPICEDB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${PAYSSAGE_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${PAYSSAGE_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${PAYSSAGE_CORS_ALLOWED_HEADERS}
      TRUST_PROXY_HEADERS: ${PAYSSAGE_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${PAYSSAGE_TRUSTED_PROXIES}
      TEST_MODE: ${PAYSSAGE_TEST_MODE}
      IDENTITY_X_PROJECT_ID: ${PAYSSAGE_IDENTITY_X_PROJECT_ID}
      IDENTITY_X_URL: ${PAYSSAGE_IDENTITY_X_URL}
      IDENTITY_X_API_KEY: ${PAYSSAGE_IDENTITY_X_API_KEY}
      MP_CLIENT_ID: ${PAYSSAGE_MP_CLIENT_ID}
      MP_ACCESS_TOKEN: ${PAYSSAGE_MP_ACCESS_TOKEN}
      MP_CLIENT_SECRET: ${PAYSSAGE_MP_CLIENT_SECRET}
      MP_REDIRECT_URI: ${PAYSSAGE_MP_REDIRECT_URI}
      MP_WEBHOOK_SECRET: ${PAYSSAGE_MP_WEBHOOK_SECRET}
      MP_TEST_ACCESS_TOKEN: ${PAYSSAGE_MP_TEST_ACCESS_TOKEN}
      MP_TEST_PUBLIC_KEY: ${PAYSSAGE_MP_TEST_PUBLIC_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  payssage-database:
    image: postgres:18
    container_name: payssage-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAYSSAGE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYSSAGE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYSSAGE_POSTGRES_DB}
    volumes:
      - payssage-db:/var/lib/postgresql
    networks:
      - internal

  payssage-redis:
    image: redis:7-alpine
    container_name: payssage-redis
    restart: unless-stopped
    command: redis-server --requirepass ${PAYSSAGE_REDIS_PASSWORD} --appendonly yes
    volumes:
      - payssage-redis:/data
    networks:
      - internal

  payssage-spicedb-migrate:
    image: authzed/spicedb:latest
    container_name: payssage-spicedb-migrate
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${PAYSSAGE_POSTGRES_USER}:${PAYSSAGE_POSTGRES_PASSWORD}@payssage-database:5432/${PAYSSAGE_POSTGRES_DB}?sslmode=disable"
    depends_on:
      payssage-database:
        condition: service_started
    networks:
      - internal

  payssage-spicedb:
    image: authzed/spicedb:latest
    container_name: payssage-spicedb
    command: serve
    restart: unless-stopped
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${PAYSSAGE_SPICEDB_TOKEN}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${PAYSSAGE_POSTGRES_USER}:${PAYSSAGE_POSTGRES_PASSWORD}@payssage-database:5432/${PAYSSAGE_POSTGRES_DB}?sslmode=disable"
    depends_on:
      payssage-spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # -----------------
  # 📢 INFORMD
  # -----------------
  informd:
    image: ghcr.io/trieoh/informd:${INFORMD_TAG}
    container_name: informd
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      informd-database:
        condition: service_started
      informd-redis:
        condition: service_started
      informd-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${INFORMD_POSTGRES_USER}:${INFORMD_POSTGRES_PASSWORD}@informd-database:5432/${INFORMD_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${INFORMD_REDIS_ADDR}
      REDIS_DB: ${INFORMD_REDIS_DB}
      REDIS_PASSWORD: ${INFORMD_REDIS_PASSWORD}
      REDIS_ASYNQ_DB: ${INFORMD_REDIS_ASYNQ_DB}
      SPICEDB_ADDR: ${INFORMD_SPICEDB_ADDR}
      SPICEDB_TOKEN: ${INFORMD_SPICEDB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${INFORMD_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${INFORMD_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${INFORMD_CORS_ALLOWED_HEADERS}
      TRUST_PROXY_HEADERS: ${INFORMD_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${INFORMD_TRUSTED_PROXIES}
      IDENTITY_X_PROJECT_ID: ${INFORMD_IDENTITY_X_PROJECT_ID}
      IDENTITY_X_URL: ${INFORMD_IDENTITY_X_URL}
      IDENTITY_X_API_KEY: ${INFORMD_IDENTITY_X_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  informd-database:
    image: postgres:18
    container_name: informd-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFORMD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${INFORMD_POSTGRES_PASSWORD}
      POSTGRES_DB: ${INFORMD_POSTGRES_DB}
    volumes:
      - informd-db:/var/lib/postgresql
    networks:
      - internal

  informd-redis:
    image: redis:7-alpine
    container_name: informd-redis
    restart: unless-stopped
    command: redis-server --requirepass ${INFORMD_REDIS_PASSWORD} --appendonly yes
    volumes:
      - informd-redis:/data
    networks:
      - internal

  informd-spicedb-migrate:
    image: authzed/spicedb:latest
    container_name: informd-spicedb-migrate
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${INFORMD_POSTGRES_USER}:${INFORMD_POSTGRES_PASSWORD}@informd-database:5432/${INFORMD_POSTGRES_DB}?sslmode=disable"
    depends_on:
      informd-database:
        condition: service_started
    networks:
      - internal

  informd-spicedb:
    image: authzed/spicedb:latest
    container_name: informd-spicedb
    command: serve
    restart: unless-stopped
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${INFORMD_SPICEDB_TOKEN}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${INFORMD_POSTGRES_USER}:${INFORMD_POSTGRES_PASSWORD}@informd-database:5432/${INFORMD_POSTGRES_DB}?sslmode=disable"
    depends_on:
      informd-spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # -----------------
  # 🎟️ UNIVENTS
  # -----------------
  univents:
    image: ghcr.io/trieoh/univents:${UNIVENTS_TAG}
    container_name: univents
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      identity-x:
        condition: service_healthy
      payssage:
        condition: service_healthy
      univents-database:
        condition: service_started
      univents-redis:
        condition: service_started
      univents-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${UNIVENTS_POSTGRES_USER}:${UNIVENTS_POSTGRES_PASSWORD}@univents-database:5432/${UNIVENTS_POSTGRES_DB}?sslmode=disable"
      PORT: 8080
      REDIS_ADDR: ${UNIVENTS_REDIS_ADDR}
      REDIS_DB: ${UNIVENTS_REDIS_DB}
      REDIS_PASSWORD: ${UNIVENTS_REDIS_PASSWORD}
      REDIS_ASYNQ_DB: ${UNIVENTS_REDIS_ASYNQ_DB}
      SPICEDB_ADDR: ${UNIVENTS_SPICEDB_ADDR}
      SPICEDB_TOKEN: ${UNIVENTS_SPICEDB_TOKEN}
      CORS_ALLOWED_ORIGINS: ${UNIVENTS_CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${UNIVENTS_CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${UNIVENTS_CORS_ALLOWED_HEADERS}
      TRUST_PROXY_HEADERS: ${UNIVENTS_TRUST_PROXY_HEADERS}
      TRUSTED_PROXIES: ${UNIVENTS_TRUSTED_PROXIES}
      WS_JWT_SECRET: ${UNIVENTS_WS_JWT_SECRET}
      IDENTITY_X_PROJECT_ID: ${UNIVENTS_IDENTITY_X_PROJECT_ID}
      IDENTITY_X_URL: ${UNIVENTS_IDENTITY_X_URL}
      IDENTITY_X_API_KEY: ${UNIVENTS_IDENTITY_X_API_KEY}
      PAYSSAGE_URL: ${UNIVENTS_PAYSSAGE_URL}
      PAYSSAGE_PROVIDER: ${UNIVENTS_PAYSSAGE_PROVIDER}
      PAYSSAGE_API_KEY: ${UNIVENTS_PAYSSAGE_API_KEY}
      PAYSSAGE_WEBHOOK_SECRET: ${UNIVENTS_PAYSSAGE_WEBHOOK_SECRET}
      OBJECT_STORAGE_ENDPOINT: ${UNIVENTS_OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_ACCESS_KEY: ${UNIVENTS_OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${UNIVENTS_OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_USE_SSL: ${UNIVENTS_OBJECT_STORAGE_USE_SSL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  univents-database:
    image: postgres:18
    container_name: univents-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${UNIVENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${UNIVENTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${UNIVENTS_POSTGRES_DB}
    volumes:
      - univents-db:/var/lib/postgresql
    networks:
      - internal

  univents-redis:
    image: redis:7-alpine
    container_name: univents-redis
    restart: unless-stopped
    command: redis-server --requirepass ${UNIVENTS_REDIS_PASSWORD} --appendonly yes
    volumes:
      - univents-redis:/data
    networks:
      - internal

  univents-spicedb-migrate:
    image: authzed/spicedb:latest
    container_name: univents-spicedb-migrate
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${UNIVENTS_POSTGRES_USER}:${UNIVENTS_POSTGRES_PASSWORD}@univents-database:5432/${UNIVENTS_POSTGRES_DB}?sslmode=disable"
    depends_on:
      univents-database:
        condition: service_started
    networks:
      - internal

  univents-spicedb:
    image: authzed/spicedb:latest
    container_name: univents-spicedb
    command: serve
    restart: unless-stopped
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${UNIVENTS_SPICEDB_TOKEN}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${UNIVENTS_POSTGRES_USER}:${UNIVENTS_POSTGRES_PASSWORD}@univents-database:5432/${UNIVENTS_POSTGRES_DB}?sslmode=disable"
    depends_on:
      univents-spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal


  # -----------------
  # 📝 DOZZLE (Logs)
  # -----------------
  dozzle:
    profiles: [infra]
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_BASE: /admin/dozzle
    networks:
      - internal

  # -----------------------------
  # 🧬 UPTIME KUMA (Status Pages)
  # -----------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma_data:/app/data
    networks:
      - internal

  # -------------------
  # 📂 RUSTFS (Storage)
  # -------------------
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"] # Ajuste o path de health se o RustFS tiver um específico
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------
  # 📧 MAIL (Mox)
  # -----------------
  mox:
    profiles: [email]
    image: r.xmox.nl/mox:latest
    container_name: mox
    restart: unless-stopped
    environment:
      - MOX_DOCKER=yes
    networks:
      - internal
    ports:
      - "25:25"   # SMTP
      - "465:465" # SMTPS
      - "587:587" # Submission
      - "993:993" # IMAPS
    volumes:
      - ./mox_mailserver/config:/mox/config
      - ./mox_mailserver/data:/mox/data
      - ./mox_mailserver/certs:/mox/certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: mox -config /mox/config/mox.conf serve

  # -----------------
  # 🔧 FORGEJO (Git)
  # -----------------
  forgejo:
    profiles: [git]
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      forgejo-database:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-database:5432
      - FORGEJO__database__NAME=${FORGEJO_POSTGRES_DB}
      - FORGEJO__database__USER=${FORGEJO_POSTGRES_USER}
      - FORGEJO__database__PASSWD=${FORGEJO_POSTGRES_PASSWORD}
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN}
      - FORGEJO__server__ROOT_URL=https://${FORGEJO_DOMAIN}
      - FORGEJO__server__SSH_DOMAIN=${FORGEJO_DOMAIN}
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__server__HTTP_PORT=3000
    networks:
      - internal
    volumes:
      - forgejo-data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  forgejo-database:
    profiles: [git]
    image: postgres:18
    container_name: forgejo-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FORGEJO_POSTGRES_USER}
      POSTGRES_PASSWORD: ${FORGEJO_POSTGRES_PASSWORD}
      POSTGRES_DB: ${FORGEJO_POSTGRES_DB}
    volumes:
      - forgejo-db:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------
  # 🏃 FORGEJO RUNNER
  # -----------------
  forgejo-runner:
    profiles: [git]
    image: code.forgejo.org/forgejo/runner:12
    container_name: forgejo-runner
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://forgejo-dind:2375
    networks:
      - internal
    volumes:
      - ./forgejo-runner/config.yml:/data/config.yml
      - forgejo-runner-data:/data
    command: /bin/sh -c "sleep 5 && forgejo-runner daemon --config /data/config.yml"

  # -----------------
  # 🐳 FORGEJO DIND
  # -----------------
  forgejo-dind:
    profiles: [git]
    image: docker:dind
    container_name: forgejo-dind
    privileged: true
    restart: unless-stopped
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - internal
    volumes:
      - forgejo-dind-data:/var/lib/docker
      - buildkit-cache:/var/cache/buildkit

# -----------------
# 📦 VOLUMES
# -----------------
volumes:
  buildkit-cache:
  caddy_config:
  caddy_data:
  identityx-db:
  informd-db:
  informd-redis:
  payssage-db:
  payssage-redis:
  rustfs_data:
  rustfs_logs:
  univents-db:
  forgejo-data:
  forgejo-db:
  forgejo-runner-data:
  forgejo-dind-data:
  univents-redis:
  uptime-kuma_data:

# -----------------
# 🌐 NETWORKS
# -----------------
networks:
  internal:
    driver: bridge
