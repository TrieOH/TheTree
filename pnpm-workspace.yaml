packages:
  - 'front/*'
  - 'lib/ts/*'
  - 'docs'
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@trieoh/identityx-sdk-ts'
  - 'shiki'
  - '@shikijs/*'
blockExoticSubdeps: true
trustPolicy: check-and-allow-fixes
onlyBuiltDependencies:
  - esbuild
  - lightningcss
  - '@cloudflare/workerd-linux-64'
  - workerd
  - core-js
  - msw
  - protobufjs
  - sharp
  - unrs-resolver
allowBuilds:
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true
