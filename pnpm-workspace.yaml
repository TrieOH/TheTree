packages:
  - 'front/*'
  - 'lib/ts/*'
  - 'docs'

catalog:
  # === @trieoh ===
  '@trieoh/identityx-sdk-ts': ^0.12.7
  '@trieoh/envoy-fetch-ts': ^0.1.5

  # === Core UI ===
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0

  # === TanStack ===
  '@tanstack/react-router': ^1.132.0
  '@tanstack/react-start': ^1.132.0
  '@tanstack/react-query': ^5.66.5
  '@tanstack/router-plugin': ^1.132.0

  # === Styles ===
  tailwindcss: ^4.0.6
  '@tailwindcss/vite': ^4.0.6
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.0.2

  # === Animations & Icons ===
  motion: ^12.29.2
  lucide-react: ^0.544.0

  # === Validation ===
  zod: ^4.2.1

  # === Build / Tooling ===
  typescript: ^5.7.2
  vite: ^7.1.7
  '@vitejs/plugin-react': ^5.0.4
  vite-tsconfig-paths: ^5.1.4
  '@cloudflare/vite-plugin': ^1.28.0
  wrangler: ^4.84.1

  # === Misc ===
  sonner: ^2.0.7
  posthog-js: ^1.335.2
  next-themes: ^0.4.6
  tw-animate-css: ^1.4.0
  '@t3-oss/env-core': ^0.13.11
  '@base-ui/react': ^1.6.0


minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@trieoh/identityx-sdk-ts'
  - 'shiki'
  - '@shikijs/*'
blockExoticSubdeps: true
trustPolicy: check-and-allow-fixes
onlyBuiltDependencies:
  - esbuild
  - lightningcss
  - '@cloudflare/workerd-linux-64'
  - workerd
  - core-js
  - msw
  - protobufjs
  - sharp
  - unrs-resolver
allowBuilds:
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true