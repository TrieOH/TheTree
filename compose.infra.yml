# =============================================================
# compose.infra.yml
#
# Optional infrastructure services: monitoring, storage, mail,
# git forge. Activate individually via Docker profiles or by
# including this file alongside the others.
#
# Profiles:
#   infra  → dozzle, uptime-kuma, rustfs
#   email  → mox
#   git    → forgejo, forgejo-runner, forgejo-dind
# =============================================================

services:

  # =============================================================
  # 📝 DOZZLE (log viewer)
  # =============================================================

  dozzle:
    profiles: [infra]
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_BASE: /admin/dozzle
    networks:
      - internal

  # =============================================================
  # 🧬 UPTIME KUMA (status pages)
  # =============================================================

  uptime-kuma:
    profiles: [infra]
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma_data:/app/data
    networks:
      - internal

  # =============================================================
  # 📂 RUSTFS (S3-compatible storage)
  # =============================================================

  rustfs:
    profiles: [infra]
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================
  # 📧 MOX (mail server)
  # =============================================================

  mox:
    profiles: [email]
    image: r.xmox.nl/mox:latest
    container_name: mox
    restart: unless-stopped
    environment:
      - MOX_DOCKER=yes
    networks:
      - internal
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./mox_mailserver/config:/mox/config
      - ./mox_mailserver/data:/mox/data
      - ./mox_mailserver/certs:/mox/certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: mox -config /mox/config/mox.conf serve

  # =============================================================
  # 🔧 FORGEJO (git forge)
  # =============================================================

  forgejo:
    profiles: [git]
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=${FORGEJO_POSTGRES_DB}
      - FORGEJO__database__USER=${FORGEJO_POSTGRES_USER}
      - FORGEJO__database__PASSWD=${FORGEJO_POSTGRES_PASSWORD}
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN}
      - FORGEJO__server__ROOT_URL=https://${FORGEJO_DOMAIN}
      - FORGEJO__server__SSH_DOMAIN=${FORGEJO_DOMAIN}
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__server__HTTP_PORT=3000
    networks:
      - internal
    volumes:
      - forgejo-data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Forgejo also needs its own DB — add to init.sql via profile note
  # (handled in init-databases.sh when FORGEJO_POSTGRES_USER is set)

  forgejo-runner:
    profiles: [git]
    image: code.forgejo.org/forgejo/runner:12
    container_name: forgejo-runner
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://forgejo-dind:2375
    networks:
      - internal
    volumes:
      - ./forgejo-runner/config.yml:/data/config.yml
      - forgejo-runner-data:/data
    command: /bin/sh -c "sleep 5 && forgejo-runner daemon --config /data/config.yml"

  forgejo-dind:
    profiles: [git]
    image: docker:dind
    container_name: forgejo-dind
    privileged: true
    restart: unless-stopped
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - internal
    volumes:
      - forgejo-dind-data:/var/lib/docker
      - buildkit-cache:/var/cache/buildkit

volumes:
  uptime-kuma_data:
  rustfs_data:
  rustfs_logs:
  forgejo-data:
  forgejo-runner-data:
  forgejo-dind-data:
  buildkit-cache: