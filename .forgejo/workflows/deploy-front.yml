name: Deploy Frontends

on:
  push:
    branches:
      - main
    paths:
      - 'front/identityx/**'
      - 'front/informd/**'
      - 'front/payssage/**'
      - 'front/spicedb/**'
      - 'front/univents/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changes
        uses: https://github.com/dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            identityx:
              - 'front/identityx/**'
            informd:
              - 'front/informd/**'
            payssage:
              - 'front/payssage/**'
            spicedb:
              - 'front/spicedb/**'
            univents:
              - 'front/univents/**'

      - name: Check if any frontend changed
        id: any_frontend
        run: echo "changed=${{ steps.filter.outputs.identityx == 'true' || steps.filter.outputs.informd == 'true' || steps.filter.outputs.payssage == 'true' || steps.filter.outputs.spicedb == 'true' || steps.filter.outputs.univents == 'true' }}" >> $GITHUB_OUTPUT

      - name: Setup Node
        if: steps.any_frontend.outputs.changed == 'true'
        uses: https://github.com/actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        if: steps.any_frontend.outputs.changed == 'true'
        uses: https://github.com/pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        if: steps.any_frontend.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build IdentityX
        if: ${{ steps.filter.outputs.identityx == 'true' }}
        run: pnpm -F identityx build
        env:
          VITE_APP_TITLE: ${{ vars.IDENTITYX_APP_TITLE }}
          VITE_API_URL: ${{ vars.IDENTITYX_API_URL }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.IDENTITYX_POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.IDENTITYX_POSTHOG_KEY }}

      - name: Deploy IdentityX
        if: ${{ steps.filter.outputs.identityx == 'true' }}
        uses: https://github.com/cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front/identityx
          command: deploy

      - name: Build Informd
        if: ${{ steps.filter.outputs.informd == 'true' }}
        run: pnpm -F informd build
        env:
          VITE_APP_TITLE: ${{ vars.INFORMD_APP_TITLE }}
          VITE_API_URL: ${{ vars.INFORMD_API_URL }}
          VITE_AUTH_API_URL: ${{ vars.INFORMD_AUTH_API_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.INFORMD_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.INFORMD_POSTHOG_HOST }}
          VITE_TRIEOH_AUTH_PROJECT_ID: ${{ secrets.INFORMD_AUTH_PROJECT_ID }}

      - name: Deploy Informd
        if: ${{ steps.filter.outputs.informd == 'true' }}
        uses: https://github.com/cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front/informd
          command: deploy

      - name: Build Payssage
        if: ${{ steps.filter.outputs.payssage == 'true' }}
        run: pnpm -F payssage build
        env:
          VITE_APP_TITLE: ${{ vars.PAYSSAGE_APP_TITLE }}
          VITE_API_URL: ${{ vars.PAYSSAGE_API_URL }}
          VITE_AUTH_API_URL: ${{ vars.PAYSSAGE_AUTH_API_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.PAYSSAGE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.PAYSSAGE_POSTHOG_HOST }}
          VITE_TRIEOH_AUTH_PROJECT_ID: ${{ secrets.PAYSSAGE_AUTH_PROJECT_ID }}
          VITE_MERCADO_PAGO_CALLBACK_URL: ${{ vars.PAYSSAGE_MERCADO_PAGO_CALLBACK_URL }}

      - name: Deploy Payssage
        if: ${{ steps.filter.outputs.payssage == 'true' }}
        uses: https://github.com/cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front/payssage
          command: deploy

      - name: Build Spicedb
        if: ${{ steps.filter.outputs.spicedb == 'true' }}
        run: pnpm -F spicedb-ui build
        env:
          VITE_APP_TITLE: ${{ vars.SPICEDB_APP_TITLE }}
          VITE_POSTHOG_KEY: ${{ secrets.SPICEDB_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.SPICEDB_POSTHOG_HOST }}

      - name: Deploy Spicedb
        if: ${{ steps.filter.outputs.spicedb == 'true' }}
        uses: https://github.com/cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front/spicedb
          command: deploy

      - name: Build Univents
        if: ${{ steps.filter.outputs.univents == 'true' }}
        run: pnpm -F univents build
        env:
          VITE_APP_TITLE: ${{ vars.UNIVENTS_APP_TITLE }}
          VITE_API_URL: ${{ vars.UNIVENTS_API_URL }}
          VITE_AUTH_API_URL: ${{ vars.UNIVENTS_AUTH_API_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.UNIVENTS_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.UNIVENTS_POSTHOG_HOST }}
          VITE_TRIEOH_AUTH_PROJECT_ID: ${{ secrets.UNIVENTS_AUTH_PROJECT_ID }}
          VITE_MERCADO_PAGO_CALLBACK_URL: ${{ vars.UNIVENTS_MERCADO_PAGO_CALLBACK_URL }}
          VITE_MERCADO_PAGO_PUBLIC_KEY: ${{ secrets.UNIVENTS_MERCADO_PAGO_PUBLIC_KEY }}

      - name: Deploy Univents
        if: ${{ steps.filter.outputs.univents == 'true' }}
        uses: https://github.com/cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: front/univents
          command: deploy
