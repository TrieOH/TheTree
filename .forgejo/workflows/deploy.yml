name: Deploy

on:
  workflow_run:
    workflows: ["Build & Publish"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH and deploy
        uses: https://github.com/appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/trieoh
            git pull
            docker compose -f compose.prod.yml --env-file .tags.env --profile core --profile obs pull
            docker compose -f compose.prod.yml --env-file .tags.env --profile core --profile obs up -d
