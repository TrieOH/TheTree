name: CI
on:
  pull_request:
    branches:
      - main
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      identityx: ${{ steps.filter.outputs.identityx }}
      informd: ${{ steps.filter.outputs.informd }}
      payssage: ${{ steps.filter.outputs.payssage }}
      univents: ${{ steps.filter.outputs.univents }}
      any: ${{ steps.filter.outputs.identityx == 'true' || steps.filter.outputs.informd == 'true' || steps.filter.outputs.payssage == 'true' || steps.filter.outputs.univents == 'true' }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identityx:
              - 'api/identityx/**'
              - 'lib/go/**'
            informd:
              - 'api/informd/**'
              - 'lib/go/**'
            payssage:
              - 'api/payssage/**'
              - 'lib/go/**'
            univents:
              - 'api/univents/**'
              - 'lib/go/**'
  format:
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: gofmt -w .
      - name: commit formatted code
        run: |
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@noreply.git.trieoh.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: gofmt"
          git push
  build:
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - run: curl -fsSL https://get.docker.com | sh
      - if: ${{ needs.changes.outputs.identityx == 'true' }}
        run: docker build -f api/identityx/Dockerfile .
      - if: ${{ needs.changes.outputs.informd == 'true' }}
        run: docker build -f api/informd/Dockerfile .
      - if: ${{ needs.changes.outputs.payssage == 'true' }}
        run: docker build -f api/payssage/Dockerfile .
      - if: ${{ needs.changes.outputs.univents == 'true' }}
        run: docker build -f api/univents/Dockerfile .
  test:
    needs: [changes, build]
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: |
          apt-get update
          apt-get install -y just lcov
          go install gotest.tools/gotestsum@latest
          go install github.com/jandelgado/gcov2lcov@latest
          go install github.com/vektra/mockery/v3@latest
      - if: ${{ needs.changes.outputs.identityx == 'true' }}
        run: just test identityx
      - if: ${{ needs.changes.outputs.informd == 'true' }}
        run: just test informd
      - if: ${{ needs.changes.outputs.payssage == 'true' }}
        run: just test payssage
      - if: ${{ needs.changes.outputs.univents == 'true' }}
        run: just test univents
