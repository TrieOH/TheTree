services:
  informd:
    container_name: informd
    build:
      context: ../..
      dockerfile: api/Informd/Dockerfile
    ports:
      - "8084:8080"
    networks:
      - internal
      - univents-net
    depends_on:
      informd-database:
        condition: service_started
      informd-redis:
        condition: service_started
      informd-spicedb:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"

      APP_NAME: Informd
      PORT: ${PORT:-8080}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      ENV: ${ENV:-development}

      DISABLE_RATE_LIMIT: false

      REDIS_ADDR: ${REDIS_ADDR:-informd-redis:6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      IDENTITY_X_URL: ${IDENTITY_X_URL:-http://identity-x:8080}
      IDENTITY_X_API_KEY: ${IDENTITY_X_API_KEY}
      IDENTITY_X_PROJECT_ID: ${IDENTITY_X_PROJECT_ID}

      SPICEDB_ADDR: ${SPICEDB_ADDR:-informd-spicedb:50051}
      SPICEDB_TOKEN: ${SPICEDB_TOKEN}

  informd-database:
    container_name: informd-database
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - database-data:/var/lib/postgresql
    networks:
      - internal

  informd-redis:
    container_name: informd-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    ports:
      - "6382:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal

  informd-spicedb-database:
    container_name: informd-spicedb-database
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SPICEDB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SPICEDB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SPICEDB_POSTGRES_DB}
    volumes:
      - spicedb-data:/var/lib/postgresql
    networks:
      - internal

  informd-spicedb-migrate:
    container_name: informd-spicedb-migrate
    image: authzed/spicedb:latest
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${SPICEDB_POSTGRES_USER}:${SPICEDB_POSTGRES_PASSWORD}@informd-spicedb-database:5432/${SPICEDB_POSTGRES_DB}?sslmode=disable"
    depends_on:
      informd-spicedb-database:
        condition: service_started
    networks:
      - internal

  informd-spicedb:
    container_name: informd-spicedb
    image: authzed/spicedb:latest
    command: serve --http-enabled true
    restart: unless-stopped
    ports:
      - "50051:50051"
      - "8443:8443"
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_TOKEN}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://${SPICEDB_POSTGRES_USER}:${SPICEDB_POSTGRES_PASSWORD}@informd-spicedb-database:5432/${SPICEDB_POSTGRES_DB}?sslmode=disable"
    depends_on:
      informd-spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

volumes:
  database-data:
  redis-data:
  spicedb-data:

networks:
  internal:
    driver: bridge
  univents-net:
    external: true

